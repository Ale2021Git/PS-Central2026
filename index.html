<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PS Central</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003399">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --azul-escuro: #003399;
            --azul-claro: #e8f0fe;
            --branco: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
            color: var(--azul-escuro);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header igual à foto */
        header {
            background-color: #002d80;
            color: white;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .header-text h2 { margin: 0; font-size: 16px; text-transform: uppercase; }
        .header-text p { margin: 0; font-size: 11px; opacity: 0.8; }

        .header-icons { display: flex; gap: 8px; }
        .icon {
            background: rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 8px;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        /* Card do Relógio */
        .clock-card {
            background: var(--branco);
            width: 90%;
            margin-top: 20px;
            padding: 25px 0;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        #relogio {
            font-size: 45px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .status-badge {
            background-color: var(--azul-claro);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        /* Seletor de Equipe Estilizado */
        .equipe-container {
            width: 90%;
            margin: 20px 0;
        }

        select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--azul-escuro);
            background: white;
            color: var(--azul-escuro);
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            appearance: none; /* Remove seta padrão */
        }

        /* Calendário */
        .calendar-box {
            background: white;
            width: 90%;
            padding: 20px;
            border-radius: 25px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .cal-title {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .grid-dias {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .week-head { font-size: 10px; color: #999; font-weight: bold; text-transform: uppercase; }

        .dia {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .dia.trabalho { background: #0051a2; color: white; }
        .dia.folga { background: var(--azul-claro); color: var(--azul-escuro); }
        .dia.destaque { background: #2ecc71; color: white; } /* O verde da sua foto */
    </style>
</head>
<body>

    <header>
        <div class="header-text">
            <h2>PS CENTRAL</h2>
            <p>Dr. Armando G. S. Couto</p>
        </div>
        <div class="header-icons">
            <div class="icon">❓</div>
            <div class="icon">📊</div>
            <div class="icon">📞</div>
        </div>
    </header>

    <div class="clock-card">
        <span id="relogio">00:00:00</span>
        <div class="status-badge" id="badge-hoje">
            🏠 HOJE: FOLGA
        </div>
    </div>

    <div class="equipe-container">
        <select id="equipeSelect" onchange="mudarEquipe(this.value)">
            <option value="A">EQUIPE A</option>
            <option value="B">EQUIPE B</option>
            <option value="C">EQUIPE C</option>
            <option value="D">EQUIPE D</option>
        </select>
    </div>

    <div class="calendar-box">
        <div class="cal-title">
            <span style="color:#002d80">Janeiro</span>
            <span style="color:#002d80; opacity:0.5">2026</span>
        </div>
        <div class="grid-dias">
            <div class="week-head">Seg</div><div class="week-head">Ter</div><div class="week-head">Qua</div>
            <div class="week-head">Qui</div><div class="week-head">Sex</div><div class="week-head">Sáb</div><div class="week-head">Dom</div>
            
            <div class="dia folga">1</div><div class="dia folga">2</div><div class="dia folga">3</div><div class="dia folga">4</div>
            <div class="dia trabalho">5</div><div class="dia folga">6</div><div class="dia trabalho">7</div>
            <div class="dia destaque">8</div><div class="dia trabalho">9</div><div class="dia folga">10</div><div class="dia trabalho">11</div>
        </div>
    </div>

    <script>
        // Relógio real
        function updateClock() {
            const now = new Date();
            document.getElementById('relogio').innerText = now.toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Lógica para manter a equipe salva
        const select = document.getElementById('equipeSelect');

        window.onload = () => {
            const salva = localStorage.getItem('equipeSalva') || 'A';
            select.value = salva;
            renderizar(salva);
        };

        function mudarEquipe(valor) {
            localStorage.setItem('equipeSalva', valor);
            renderizar(valor);
        }

        function renderizar(equipe) {
            console.log("App carregado para equipe:", equipe);
            // Aqui você pode adicionar a lógica que calcula os dias de trabalho 
            // e muda as cores das divs .dia automaticamente
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {});
        }
    </script>
</body>
</html>
